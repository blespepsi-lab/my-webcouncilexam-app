<!DOCTYPE html>
<html lang="en">
<head>
    <title>Championship Scoreboard & Statistics Report</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { background: #f4f6f9; font-size: 13px; color: #333; font-family: system-ui, -apple-system, sans-serif; }
        .dashboard-container { max-width: 1200px; margin: auto; }
        
        /* Leaderboard and Cards styling */
        .leaderboard-card { background: white; border-radius: 8px; border: 1px solid #e3e6f0; overflow: hidden; }
        .leaderboard-header { background: #4e73df; color: white; padding: 12px 15px; font-weight: bold; font-size: 1.1rem; }
        .church-report-card { background: white; border-radius: 6px; border: 1px solid #dddfeb; margin-bottom: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .church-card-title { background: #343a40; color: #ffc107; padding: 10px 15px; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Table overrides */
        .table-custom th { background-color: #f8f9fa !important; font-weight: 600; text-align: center; border: 1px solid #e3e6f0; }
        .table-custom td { text-align: center; vertical-align: middle; border: 1px solid #e3e6f0; }
        .total-row { background-color: #f1f3f5 !important; font-weight: bold; font-size: 1rem; color: #4e73df; }
        
        /* Hidden on screen view */
        .print-title { display: none; text-align: center; margin-bottom: 20px; }
        .action-layer-panel { background: #f8f9fa; border-bottom: 1px solid #e3e6f0; padding: 8px 15px; }

        /* Processing Overlay Loader Styling */
        #zipLoader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; color: white; justify-content: center; align-items: center; flex-direction: column; text-align: center; }

        /* PRINT CONFIGURATION SPECIFIC STYLE LAYER SHEET SETUP */
        @media print {
            .no-print, .btn, .section-heading, .sub-heading, .action-layer-panel { display: none !important; }
            body { background: #fff !important; padding: 0; margin: 0; font-size: 11px !important; width: 100% !important; }
            .container-fluid { width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            
            /* CRITICAL FIX: Make the clean corporate print headers show up in PDF mode */
            .print-title { display: block !important; }
            .print-title h2 { font-size: 16pt !important; margin-bottom: 2px !important; }
            .print-title h5 { font-size: 9pt !important; margin-bottom: 10px !important; }
            
            /* Print Layout Break Control Classes */
            .print-leaderboard-container { page-break-after: always; page-break-inside: avoid; width: 100% !important; }
            .print-single-church-page { page-break-before: always; page-break-inside: avoid; padding-top: 5px; width: 100% !important; }
            
            .leaderboard-card, .church-report-card { border: 1px solid #000 !important; box-shadow: none !important; margin-bottom: 0px !important; width: 100% !important; background: #fff !important; }
            .leaderboard-header { background: #f2f2f2 !important; color: #000 !important; border-bottom: 1px solid #000 !important; font-size: 11px !important; padding: 6px 10px !important; }
            .church-card-title { background: #e5e5e5 !important; color: #000 !important; border-bottom: 1px solid #000 !important; font-size: 11px !important; padding: 6px 10px !important; }
            
            /* Enforce strict table scaling down within A4 printable width borders */
            table { width: 100% !important; table-layout: fixed !important; border-collapse: collapse !important; }
            .table-custom th { background-color: #fafafa !important; color: #000 !important; border: 1px solid #000 !important; font-size: 10px !important; padding: 4px !important; }
            .table-custom td { border: 1px solid #000 !important; color: #000 !important; font-size: 10px !important; padding: 4px !important; word-wrap: break-word !important; white-space: normal !important; }
            .total-row { background-color: #eaeaea !important; color: #000 !important; }
            .total-row td { font-size: 11px !important; }
            
            @page { size: A4 portrait; margin: 10mm 10mm 10mm 10mm; }
        }
    </style>
</head>
<body>

<div id="zipLoader">
    <div class="spinner-border text-warning mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <h4 class="fw-bold">Generating Individual Church Sheets...</h4>
    <p id="zipProgressText" class="text-light text-opacity-75">Starting extraction process...</p>
</div>

<div class="container-fluid dashboard-container mt-4 mb-5 px-3">

    <div class="d-flex justify-content-between align-items-center mb-4 no-print flex-wrap gap-2">
        <div>
            <a href="/result-entry" class="btn btn-outline-dark me-2">← Back to Result Entry</a>
            <a href="/" class="btn btn-outline-secondary">Home</a>
        </div>
        <h4 class="fw-bold m-0 text-dark">📋 Competition Statistics Board</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-primary fw-bold shadow-sm px-4" onclick="window.print()">
                📥 Download Overall Full Results PDF
            </button>
            <button class="btn btn-success fw-bold shadow-sm px-4" onclick="exportAllChurchesToZip()">
                📦 Export All Churches as ZIP Folder
            </button>
        </div>
    </div>

    <div id="dynamicReportContent">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2 fw-semibold">Assembling leaderboards and compiling reports standard-wise...</p>
        </div>
    </div>

</div>

<script>
let registeredChurchElements = [];

// Explicit sizing options for html2pdf execution to safely capture elements in A4 scale rules
const pdfOptionsConfig = {
    margin:       [10, 10, 10, 10],
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, logging: false, width: 790 }, // Anchor canvas rendering width to A4 desktop aspect bounds
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
};

function downloadSingleElementAsPDF(elementId, fileNameString) {
    const targetElement = document.getElementById(elementId);
    if (!targetElement) return;

    const opt = { ...pdfOptionsConfig, filename: fileNameString + '.pdf' };
    const styleOverride = document.createElement("style");
    styleOverride.innerHTML = `
        #${elementId} { width: 100% !important; max-width: 100% !important; font-size: 11px !important; }
        #${elementId} .print-title { display: block !important; }
        #${elementId} .action-layer-panel { display: none !important; }
        #${elementId} table { width: 100% !important; table-layout: fixed !important; }
        #${elementId} td { word-wrap: break-word !important; white-space: normal !important; }
        #${elementId} .church-report-card, #${elementId} .leaderboard-card { border: 1px solid #000 !important; box-shadow: none !important; }
    `;
    targetElement.appendChild(styleOverride);

    html2pdf().set(opt).from(targetElement).save().then(() => { styleOverride.remove(); });
}

async function exportAllChurchesToZip() {
    if (registeredChurchElements.length === 0) return;
    
    const loader = document.getElementById("zipLoader");
    const progressText = document.getElementById("zipProgressText");
    loader.style.display = "flex";

    const zip = new JSZip();
    
    const globalStyleOverride = document.createElement("style");
    globalStyleOverride.innerHTML = `
        .print-title { display: block !important; }
        .action-layer-panel { display: none !important; }
        table { width: 100% !important; table-layout: fixed !important; }
        td { word-wrap: break-word !important; white-space: normal !important; }
        .church-report-card { border: 1px solid #000 !important; box-shadow: none !important; }
    `;
    document.head.appendChild(globalStyleOverride);

    for (let i = 0; i < registeredChurchElements.length; i++) {
        const item = registeredChurchElements[i];
        progressText.innerText = `Rendering PDF file ${i + 1} of ${registeredChurchElements.length}:\n${item.name.replace(/-/g, ' ')}`;
        
        const element = document.getElementById(item.id);
        if (element) {
            const pdfBlob = await html2pdf().set(pdfOptionsConfig).from(element).output('blob');
            zip.file(`${item.name}.pdf`, pdfBlob);
        }
    }

    progressText.innerText = "Packing separate ledgers into folder structure. Downloading ZIP file archive...";
    
    zip.generateAsync({ type: "blob" }).then(function(content) {
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(content);
        link.download = "CHURCH-RESULTS-INDIVIDUAL-2026.zip";
        link.click();
        
        globalStyleOverride.remove();
        loader.style.display = "none";
    });
}

document.addEventListener("DOMContentLoaded", function() {
    fetch("/api/scoreboard-statistics")
    .then(r => r.json())
    .then(response => {
        if (response.status !== "success") {
            document.getElementById("dynamicReportContent").innerHTML = `
                <div class="alert alert-danger m-3">Calculation Compilation Error: ${response.message}</div>
            `;
            return;
        }

        const data = response.data;
        let html = "";

        const councils = ["WEST Council", "EAST Council"];
        const types = ["Headquarters", "Branch"];
        const standards = ["LKG", "UKG", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII", "TEACHER"];

        let uniqueIdCounter = 0;
        registeredChurchElements = [];

        councils.forEach(council => {
            html += `<h1 class="fw-bold mt-5 mb-3 text-dark border-bottom pb-2 text-uppercase fs-2 section-heading" style="letter-spacing:1px;">📍 ${council}</h1>`;
            
            types.forEach(type => {
                const segment = data[council][type];
                uniqueIdCounter++;
                const leaderboardId = `leaderboard_block_${uniqueIdCounter}`;
                
                let breakStyle = uniqueIdCounter > 1 ? 'style="page-break-before: always;"' : '';
                
                html += `
                    <div class="my-4">
                        <h3 class="fw-bold text-secondary mb-3 text-capitalize sub-heading">⭐ ${type} </h3>
                        
                        <div class="print-leaderboard-container mb-4" id="${leaderboardId}" ${breakStyle}>
                            <div class="print-title text-center">
                                <h2>⛪ Satchiyapuram Council Scripture Exam 2026</h2>
                                <h5>📍 ${council.toUpperCase()} — ${type.toUpperCase()} CUP WINNERS LIST</h5>
                            </div>

                            <div class="leaderboard-card shadow-sm">
                                <div class="action-layer-panel no-print d-flex justify-content-between align-items-center bg-light">
                                    <span class="text-muted fw-semibold font-monospace small">SUMMARY DASHBOARD VIEW</span>
                                    <button class="btn btn-sm btn-dark fw-bold px-3 py-1" onclick="downloadSingleElementAsPDF('${leaderboardId}', 'WINNER-CHURCHES-${council.toUpperCase().replace(/\s+/g, '-')}-${type.toUpperCase()}')">
                                        ⚡ Download Leaderboard PDF
                                    </button>
                                </div>
                                <div class="leaderboard-header">🏆 TOP 3 PLACES WINNER CHURCHES — ${council.toUpperCase()} (${type.toUpperCase()})</div>
                                <div class="table-responsive">
                                    <table class="table table-bordered align-middle m-0 text-center" style="table-layout: fixed; width: 100%;">
                                        <thead class="table-light">
                                            <tr>
                                                <th style="width: 25%;">RANKING POSITION</th>
                                                <th class="text-start" style="width: 55%;">CHURCH NAME & PLACE</th>
                                                <th style="width: 20%;">AGGREGATED SCORE</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                `;

                if (!segment || !segment.top_three || segment.top_three.length === 0) {
                    html += `<tr><td colspan="3" class="text-muted py-3">No champion rankings computed for this section block.</td></tr>`;
                } else {
                    segment.top_three.forEach(winner => {
                        let rowStyle = "";
                        if (winner.position.includes("1st")) rowStyle = 'style="background-color: #fff9db; font-weight: bold;"';
                        html += `
                            <tr ${rowStyle}>
                                <td class="fw-bold text-dark">${winner.position}</td>
                                <td class="text-start text-uppercase font-monospace fw-bold" style="word-wrap: break-word; white-space: normal;">${winner.church_title}</td>
                                <td class="fs-6 text-primary fw-bold">${winner.score} POINTS</td>
                            </tr>
                        `;
                    });
                }

                html += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <h5 class="fw-bold text-muted mt-4 mb-3 sub-heading">📋 Individual Church Winner Sheets:</h5>
                `;

                if (!segment || !segment.church_cards || segment.church_cards.length === 0) {
                    html += `<div class="alert alert-light border text-muted sub-heading">No individual church report configurations mapped to this operational section branch.</div>`;
                } else {
                    segment.church_cards.forEach(card => {
                        let finalScore = card.total_score !== undefined && card.total_score !== null ? card.total_score : 0;
                        uniqueIdCounter++;
                        const churchCardElementId = `church_card_element_${uniqueIdCounter}`;
                        
                        const structuredFileName = card.title.trim().toUpperCase().replace(/[^A-Z0-9\-\s]/g, '').replace(/\s+/g, '-');

                        registeredChurchElements.push({ id: churchCardElementId, name: structuredFileName });

                        html += `
                            <div class="print-single-church-page" id="${churchCardElementId}">
                                <div class="print-title text-center">
                                    <h2>⛪ Satchiyapuram Council Scripture Exam 2026</h2>
                                    <h5 style="color: #6c757d;">Official Marks Evaluation — ${council.toUpperCase()} (${type.toUpperCase()})</h5>
                                </div>

                                <div class="church-report-card shadow-sm">
                                    <div class="action-layer-panel no-print d-flex justify-content-between align-items-center">
                                        <span class="text-muted fw-semibold small">📄 Single Standalone Unit</span>
                                        <button class="btn btn-sm btn-outline-primary fw-bold py-1 px-3" onclick="downloadSingleElementAsPDF('${churchCardElementId}', '${structuredFileName}')">
                                            📥 Download Single PDF
                                        </button>
                                    </div>
                                    <div class="church-card-title">⛪ CHURCH TITLE: ${card.title}</div>
                                    <div class="table-responsive">
                                        <table class="table table-bordered table-striped m-0 table-custom align-middle" style="table-layout: fixed; width: 100%;">
                                            <thead>
                                                <tr>
                                                    <th style="width: 15%;">STANDARD</th>
                                                    <th class="text-start" style="width: 45%;">PARTICIPANT NAME(S)</th>
                                                    <th style="width: 25%;">PRIZE WIN RANK</th>
                                                    <th style="width: 15%;">SCORE</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                        `;

                        standards.forEach(std => {
                            const rawItem = (card.items && card.items[std]) ? card.items[std] : null;
                            let itemsArray = [];
                            
                            if (Array.isArray(rawItem)) {
                                itemsArray = rawItem;
                            } else if (rawItem) {
                                itemsArray = [rawItem];
                            } else {
                                itemsArray = [{ name: "", prize: "", score: 0 }];
                            }

                            itemsArray.forEach(item => {
                                let participantName = item.name && item.name.trim() !== "" ? item.name : "-";
                                let prizeBadge = item.prize && item.prize.trim() !== "" ? item.prize : "-";
                                
                                let scoreValue = "-";
                                if (std === "TEACHER" && prizeBadge !== "-") {
                                    scoreValue = "0 PTS (Excl.)";
                                } else if (item.score !== undefined && item.score > 0) {
                                    scoreValue = `+${item.score} PTS`;
                                }
                                
                                if (prizeBadge.includes("First")) prizeBadge = "🥇 First Prize";
                                else if (prizeBadge.includes("Second")) prizeBadge = "🥈 Second Prize";
                                else if (prizeBadge.includes("Third")) prizeBadge = "🥉 Third Prize";

                                html += `
                                    <tr>
                                        <td class="font-monospace fw-bold text-secondary bg-light">${std}</td>
                                        <td class="text-start fw-bold text-dark text-uppercase" style="word-wrap: break-word; white-space: normal;">${participantName}</td>
                                        <td class="fw-semibold" style="word-wrap: break-word; white-space: normal;">${prizeBadge}</td>
                                        <td class="font-monospace fw-bold">${scoreValue}</td>
                                    </tr>
                                `;
                            });
                        });

                        html += `
                                                <tr class="total-row">
                                                    <td colspan="2" class="text-end text-uppercase">Grand Total Score:</td>
                                                    <td colspan="2" class="text-center text-primary fs-5 fw-bold font-monospace">${finalScore} PTS</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `</div>`;
            });
        });

        document.getElementById("dynamicReportContent").innerHTML = html;
    })
    .catch(err => {
        document.getElementById("dynamicReportContent").innerHTML = `
            <div class="alert alert-danger m-3">Network runtime validation parsing failure: ${err}</div>
        `;
    });
});
</script>

</body>
</html>
